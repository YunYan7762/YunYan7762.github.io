<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DNA双链纸模型 - 视频与图片展示</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B6B',
                        secondary: '#4ECDC4',
                        accent: '#45B7D1',
                        dark: '#1A2C3E',
                        light: '#F8F9FA'
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                        '4xl': '2rem'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
        }
        /* 渐变背景 */
        .bg-mesh {
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 107, 107, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(78, 205, 196, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(69, 183, 209, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(255, 230, 109, 0.15) 0px, transparent 50%);
        }
        /* 悬停卡片效果 */
        .hover-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hover-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        /* 图片容器内图片居中 */
        .img-container {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* 模态框动画 */
        .modal-transition {
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        /* 自定义滚动条隐藏 */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="bg-mesh min-h-screen py-12 px-4 md:px-8">
    <div class="max-w-7xl mx-auto">
        <!-- DNA双链纸模型栏目 -->
        <section id="section-dna-model" class="scroll-mt-24">
            <div class="mb-10 flex flex-col md:flex-row justify-between items-end gap-4">
                <div>
                    <h2 class="text-3xl font-black text-dark mb-2">DNA双链纸模型</h2>
                    <p class="text-gray-400 font-medium">结合手工制作，深度理解双螺旋结构</p>
                </div>
                <button id="openVideoBtn" class="px-6 py-3 bg-gradient-to-r from-accent to-secondary text-white rounded-xl font-bold text-sm hover:shadow-lg transition-all shadow-md flex items-center gap-2">
                    <span>🎬 DNA双链纸模型展示</span>
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-white p-6 md:p-8 rounded-4xl shadow-sm border border-gray-100 hover-card">
                <!-- 左边：DNA纸模型图片（可点击放大） -->
                <div class="rounded-2xl overflow-hidden shadow-md bg-gray-50 img-container" style="aspect-ratio: 210 / 297;" data-img-src="https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/jdbB8vBTjZVEdJs52x52GJ.jpg">
                    <img src="https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/jdbB8vBTjZVEdJs52x52GJ.jpg" alt="DNA双链纸模型" class="w-full h-full object-contain">
                </div>
                <!-- 右边：氢键交叉图 + 说明 -->
                <div class="flex flex-col gap-8">
                    <!-- 氢键图片（可点击放大） -->
                    <div class="rounded-2xl overflow-hidden shadow-md bg-gray-50 img-container" style="aspect-ratio: 1414 / 1000;" data-img-src="https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/2TShxybJnJQMx9u2htzUdK.jpg">
                        <img src="https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/2TShxybJnJQMx9u2htzUdK.jpg" alt="氢键交叉" class="w-full h-full object-contain">
                    </div>
                    <div class="flex-1 bg-mesh rounded-2xl p-6 flex flex-col justify-center border border-gray-100">
                        <h4 class="text-xl font-bold text-dark mb-4">模型说明</h4>
                        <ul class="space-y-3 text-gray-600 text-sm">
                            <li class="flex items-start gap-2"><span class="text-primary">●</span> <span>左侧展示了完整的DNA双链纸模型设计稿，包含磷酸、脱氧核糖及四种碱基。</span></li>
                            <li class="flex items-start gap-2"><span class="text-secondary">●</span> <span>右上侧展示了碱基互补配对时的氢键连接细节，注意A-T与G-C之间的氢键数量差异。</span></li>
                            <li class="flex items-start gap-2"><span class="text-accent">●</span> <span>点击上方按钮可观看纸模型的实际组装与展示视频，点击任意图片可放大预览。</span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 视频播放模态框（尺寸增大） -->
    <div id="videoModal" class="fixed inset-0 z-[200] bg-dark/90 backdrop-blur-md flex items-center justify-center opacity-0 invisible transition-all duration-300 modal-transition">
        <div class="bg-white w-[95%] max-w-5xl rounded-4xl shadow-2xl overflow-hidden transform scale-95 transition-all duration-300">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 bg-white">
                <h3 class="text-xl font-bold text-dark">DNA双链纸模型展示视频</h3>
                <button id="closeModalBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all text-xl">✕</button>
            </div>
            <div class="p-4 bg-black/5">
                <!-- 视频播放器尺寸增大：使用w-full，并设置min-height -->
                <video id="dnaVideo" class="w-full rounded-lg shadow-md" style="min-height: 400px;" controls controlsList="nodownload">
                    <source src="" type="video/mp4">
                    您的浏览器不支持视频播放。
                </video>
                <p class="text-center text-gray-500 text-sm mt-3">提示：请将视频文件放置在指定路径，或修改下方代码中的视频地址。</p>
            </div>
        </div>
    </div>

    <!-- 图片放大预览 Lightbox（类似核酸卡牌） -->
    <div id="imageLightbox" class="fixed inset-0 z-[300] bg-dark/90 backdrop-blur-md flex items-center justify-center opacity-0 invisible transition-all duration-300 cursor-zoom-out modal-transition">
        <button id="closeLightboxBtn" class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center rounded-full bg-white/10 text-white hover:bg-white/20 transition-all text-2xl">✕</button>
        <img id="lightboxImg" src="" class="max-w-[90%] max-h-[90%] object-contain transform scale-95 transition-all duration-300" alt="大图预览">
    </div>

    <script>
        (function() {
            // ========== 视频相关配置 ==========
            // 请将本地视频文件放在此路径，或修改为实际路径（例如：'videos/dna_paper_model.mp4'）
            const VIDEO_URL = '123.mp4';   // 👈 修改为你的本地视频文件路径
            
            const openBtn = document.getElementById('openVideoBtn');
            const modal = document.getElementById('videoModal');
            const closeBtn = document.getElementById('closeModalBtn');
            const videoElem = document.getElementById('dnaVideo');
            
            if (videoElem) {
                videoElem.querySelector('source').src = VIDEO_URL;
                videoElem.load();
            }
            
            function openVideoModal() {
                modal.classList.remove('opacity-0', 'invisible');
                modal.classList.add('opacity-100', 'visible');
                if (videoElem && VIDEO_URL) {
                    videoElem.play().catch(e => console.warn('自动播放被阻止，请手动点击播放。', e));
                }
            }
            
            function closeVideoModal() {
                modal.classList.remove('opacity-100', 'visible');
                modal.classList.add('opacity-0', 'invisible');
                if (videoElem) videoElem.pause();
            }
            
            if (openBtn) openBtn.addEventListener('click', openVideoModal);
            if (closeBtn) closeBtn.addEventListener('click', closeVideoModal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeVideoModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal && modal.classList.contains('visible')) closeVideoModal();
            });
            
            // ========== 图片点击放大（Lightbox） ==========
            const lightbox = document.getElementById('imageLightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const closeLightbox = document.getElementById('closeLightboxBtn');
            
            // 获取所有可点击放大的图片容器
            const imgContainers = document.querySelectorAll('.img-container');
            
            function openLightbox(imgSrc) {
                lightboxImg.src = imgSrc;
                lightbox.classList.remove('opacity-0', 'invisible');
                lightbox.classList.add('opacity-100', 'visible');
            }
            
            function closeLightboxFunc() {
                lightbox.classList.remove('opacity-100', 'visible');
                lightbox.classList.add('opacity-0', 'invisible');
                setTimeout(() => { lightboxImg.src = ''; }, 300);
            }
            
            imgContainers.forEach(container => {
                container.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const imgSrc = container.getAttribute('data-img-src');
                    if (imgSrc) openLightbox(imgSrc);
                });
            });
            
            if (closeLightbox) closeLightbox.addEventListener('click', closeLightboxFunc);
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) closeLightboxFunc();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightbox && lightbox.classList.contains('visible')) closeLightboxFunc();
            });
        })();
    </script>
</body>
</html>
